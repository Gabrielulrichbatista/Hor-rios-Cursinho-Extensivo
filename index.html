<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horário Extensivo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #18181f;
    --surface2: #1e1e28;
    --border: #2a2a38;
    --text: #e8e8f0;
    --muted: #7a7a96;

    /* Subject colors */
    --c-quimica:   #f97316;
    --c-matematica:#3b82f6;
    --c-fisica:    #10b981;
    --c-biologia:  #a855f7;
    --c-historia:  #f59e0b;
    --c-geografia: #06b6d4;
    --c-portugues: #ec4899;
    --c-redacao:   #84cc16;
    --c-ingles:    #14b8a6;
    --c-literatura:#fb7185;
    --c-filosofia: #8b5cf6;
    --c-sociologia:#f43f5e;
    --c-intervalo: #2a2a38;
    --c-livre:     #1e1e28;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 24px;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 16px;
  }
  .logo h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    background: linear-gradient(135deg, #e8e8f0 30%, #7a7a96);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .logo p { color: var(--muted); font-size: 13px; margin-top: 2px; }

  .header-actions { display: flex; gap: 10px; }
  .btn {
    padding: 9px 18px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all .18s;
  }
  .btn:hover { background: var(--surface2); border-color: #4a4a60; }
  .btn.primary {
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    border-color: transparent;
    color: #fff;
  }
  .btn.primary:hover { opacity: .88; }

  /* ── LEGEND ── */
  .legend-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    margin-bottom: 28px;
  }
  .legend-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px; }
  .legend { display: flex; flex-wrap: wrap; gap: 8px; }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 5px 12px;
    border-radius: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all .18s;
    user-select: none;
  }
  .legend-item:hover { border-color: #4a4a60; }
  .legend-item.hidden { opacity: .35; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  /* ── GRID TABLE ── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 28px;
  }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }

  thead th {
    background: var(--surface2);
    padding: 14px 10px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  thead th:first-child { text-align: left; padding-left: 18px; width: 100px; }

  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:last-child { border-bottom: none; }

  .time-cell {
    padding: 10px 10px 10px 18px;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    white-space: nowrap;
    vertical-align: middle;
  }

  /* break / lunch rows */
  .break-row td {
    padding: 6px 18px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--muted);
    background: var(--bg);
    text-align: center;
  }
  .break-row td:first-child { text-align: left; }

  /* slot cell */
  .slot {
    padding: 5px;
    text-align: center;
    vertical-align: middle;
    position: relative;
  }

  .aula-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    padding: 8px 6px;
    border-radius: 10px;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    min-height: 56px;
    position: relative;
    overflow: hidden;
  }
  .aula-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: inherit;
    opacity: .15;
    border-radius: inherit;
  }
  .aula-card:hover { transform: scale(1.04); box-shadow: 0 6px 20px rgba(0,0,0,.4); z-index: 2; }

  .aula-card .subject-name {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .04em;
    position: relative;
    z-index: 1;
    line-height: 1.2;
    text-align: center;
  }
  .aula-card .teacher-name {
    font-size: 10px;
    font-weight: 400;
    opacity: .78;
    position: relative;
    z-index: 1;
    text-align: center;
  }
  .aula-card .turma-badge {
    font-size: 9px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 8px;
    background: rgba(255,255,255,.15);
    position: relative;
    z-index: 1;
  }

  .empty-slot {
    height: 56px;
    border-radius: 10px;
    background: rgba(255,255,255,.02);
    border: 1.5px dashed rgba(255,255,255,.06);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all .18s;
  }
  .empty-slot:hover {
    background: rgba(255,255,255,.05);
    border-color: rgba(255,255,255,.15);
  }
  .empty-slot span { font-size: 18px; color: rgba(255,255,255,.15); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity .2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px;
    width: 100%;
    max-width: 420px;
    transform: translateY(12px);
    transition: transform .2s;
    position: relative;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal h2 { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 6px; }
  .modal .modal-sub { color: var(--muted); font-size: 13px; margin-bottom: 22px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-row.full { grid-template-columns: 1fr; }

  label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; display: block; margin-bottom: 5px; }

  input, select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 9px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color .15s;
  }
  input:focus, select:focus { border-color: #4a4a60; }
  select option { background: #1e1e28; }

  .color-preview {
    width: 28px; height: 28px; border-radius: 7px;
    border: 1px solid var(--border);
    flex-shrink: 0;
    transition: background .15s;
  }

  .subject-select-row { display: flex; align-items: center; gap: 8px; }
  .subject-select-row select { flex: 1; }

  .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
  .btn.danger { background: rgba(239,68,68,.15); border-color: rgba(239,68,68,.3); color: #f87171; }
  .btn.danger:hover { background: rgba(239,68,68,.25); }

  .close-btn {
    position: absolute; top: 16px; right: 16px;
    background: none; border: none; color: var(--muted);
    font-size: 20px; cursor: pointer; padding: 4px;
    border-radius: 6px; transition: color .15s;
  }
  .close-btn:hover { color: var(--text); }

  /* ── STATS BAR ── */
  .stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 28px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    flex: 1;
    min-width: 120px;
  }
  .stat-card .stat-num { font-size: 26px; font-weight: 700; line-height: 1; }
  .stat-card .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; font-weight: 500; }

  /* ── MANAGE SUBJECTS ── */
  .subjects-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 28px;
  }
  .subjects-panel h3 { font-size: 14px; font-weight: 700; margin-bottom: 14px; }
  .subjects-list { display: flex; flex-direction: column; gap: 8px; }
  .subject-row-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    border-radius: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
  }
  .subject-row-item .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .subject-row-item .sname { flex: 1; font-size: 13px; font-weight: 500; }
  .subject-row-item .del-btn {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 14px; padding: 2px 5px;
    border-radius: 5px; transition: color .15s;
  }
  .subject-row-item .del-btn:hover { color: #f87171; }

  .add-subject-form { display: flex; gap: 8px; margin-top: 12px; }
  .add-subject-form input { flex: 1; }
  .add-subject-form input[type=color] {
    flex: 0; width: 40px; padding: 4px; cursor: pointer;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: #1e1e28; border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 18px;
    font-size: 13px; font-weight: 500;
    opacity: 0; transform: translateY(8px);
    transition: all .3s; pointer-events: none; z-index: 200;
    display: flex; align-items: center; gap: 8px;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { border-left: 3px solid #10b981; }
  .toast.error   { border-left: 3px solid #f87171; }

  .section-toggle {
    display: flex; align-items: center; gap: 8px;
    cursor: pointer; margin-bottom: 14px;
  }
  .section-toggle h3 { font-size: 14px; font-weight: 700; }
  .section-toggle .arrow { color: var(--muted); transition: transform .2s; font-size: 13px; }
  .section-toggle.collapsed .arrow { transform: rotate(-90deg); }

  @media (max-width: 640px) {
    body { padding: 12px; }
    thead th:first-child { width: 70px; }
    .aula-card .teacher-name, .aula-card .turma-badge { display: none; }
    .aula-card .subject-name { font-size: 9px; }
    .stats { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <h1>📚 Horário Extensivo</h1>
    <p>Gerencie suas aulas e compromissos</p>
  </div>
  <div class="header-actions">
    <button class="btn" onclick="exportJSON()">⬇ Exportar</button>
    <button class="btn" onclick="importJSON()">⬆ Importar</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">
    <button class="btn primary" onclick="openAddModal()">+ Nova Aula</button>
  </div>
</header>

<!-- STATS -->
<div class="stats" id="statsBar"></div>

<!-- LEGEND -->
<div class="legend-wrap">
  <div class="legend-title">Matérias · clique para mostrar/ocultar</div>
  <div class="legend" id="legend"></div>
</div>

<!-- SCHEDULE TABLE -->
<div class="table-wrap">
  <table id="scheduleTable">
    <thead>
      <tr>
        <th>Horário</th>
        <th>Segunda</th>
        <th>Terça</th>
        <th>Quarta</th>
        <th>Quinta</th>
        <th>Sexta</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<!-- SUBJECTS PANEL -->
<div class="subjects-panel">
  <div class="section-toggle" onclick="togglePanel(this)">
    <span class="arrow">▼</span>
    <h3>Gerenciar Matérias</h3>
  </div>
  <div class="panel-content">
    <div class="subjects-list" id="subjectsList"></div>
    <div class="add-subject-form">
      <input type="text" id="newSubjectName" placeholder="Nome da nova matéria…">
      <input type="color" id="newSubjectColor" value="#3b82f6" title="Escolha a cor">
      <button class="btn primary" onclick="addSubject()">Adicionar</button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <h2 id="modalTitle">Nova Aula</h2>
    <p class="modal-sub" id="modalSub">Preencha os dados do compromisso</p>
    <div class="form-row">
      <div>
        <label>Dia</label>
        <select id="fieldDay"></select>
      </div>
      <div>
        <label>Horário</label>
        <select id="fieldTime"></select>
      </div>
    </div>
    <div class="form-row full">
      <div>
        <label>Matéria</label>
        <div class="subject-select-row">
          <div class="color-preview" id="colorPreview"></div>
          <select id="fieldSubject" onchange="updateColorPreview()"></select>
        </div>
      </div>
    </div>
    <div class="form-row">
      <div>
        <label>Professor</label>
        <input type="text" id="fieldTeacher" placeholder="Ex: João">
      </div>
      <div>
        <label>Turma</label>
        <input type="text" id="fieldTurma" placeholder="Ex: B2">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn danger" id="deleteBtn" onclick="deleteSlot()" style="display:none">Remover</button>
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn primary" onclick="saveSlot()">Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ────────────────────────────────────────────────────────────────
const DAYS = ['Segunda','Terça','Quarta','Quinta','Sexta'];
const DAY_KEYS = ['seg','ter','qua','qui','sex'];

const TIME_SLOTS = [
  { id:'07:30', label:'7:30–8:20',   type:'class' },
  { id:'08:20', label:'8:20–9:10',   type:'class' },
  { id:'09:10', label:'9:10–9:30',   type:'break', label2:'Intervalo' },
  { id:'09:30', label:'9:30–10:20',  type:'class' },
  { id:'10:20', label:'10:20–11:10', type:'class' },
  { id:'11:10', label:'11:10–11:30', type:'break', label2:'Intervalo' },
  { id:'11:30', label:'11:30–12:15', type:'class' },
  { id:'12:15', label:'12:15–13:00', type:'class' },
  { id:'13:00', label:'13:00–14:20', type:'break', label2:'Almoço' },
  { id:'14:20', label:'14:20–15:10', type:'class' },
  { id:'15:10', label:'15:10–16:00', type:'class' },
  { id:'16:00', label:'16:00–16:10', type:'break', label2:'Intervalo' },
  { id:'16:10', label:'16:10–17:00', type:'class' },
  { id:'17:00', label:'17:00–17:50', type:'class' },
  { id:'18:00', label:'18:00–18:45', type:'class' },
  { id:'18:45', label:'18:45–19:30', type:'class' },
  { id:'19:30', label:'19:30–19:40', type:'break', label2:'Intervalo' },
  { id:'19:40', label:'19:40–20:25', type:'class' },
  { id:'20:25', label:'20:25–21:10', type:'class' },
  { id:'21:10', label:'21:10–21:20', type:'break', label2:'Intervalo' },
  { id:'21:20', label:'21:20–22:05', type:'class' },
  { id:'22:05', label:'22:05–22:30', type:'class' },

const DEFAULT_SUBJECTS = {
  'Química':     '#f97316',
  'Matemática':  '#3b82f6',
  'Física':      '#10b981',
  'Biologia':    '#a855f7',
  'História':    '#f59e0b',
  'Geografia':   '#06b6d4',
  'Português':   '#ec4899',
  'Redação':     '#84cc16',
  'Inglês':      '#14b8a6',
  'Literatura':  '#fb7185',
  'Filosofia':   '#8b5cf6',
  'Sociologia':  '#f43f5e',
};

// Raw data from the xlsx
const RAW = {
  seg: {
    '07:30': { subject:'Química',    teacher:'Vini',     turma:'Q1' },
    '08:20': { subject:'Química',    teacher:'Vini',     turma:'Q1' },
    '09:30': { subject:'Geografia',  teacher:'Álvaro',   turma:'G1' },
    '10:20': { subject:'Geografia',  teacher:'Álvaro',   turma:'G1' },
    '11:30': { subject:'Biologia',   teacher:'Gui',      turma:'B3' },
    '12:15': { subject:'Biologia',   teacher:'Gui',      turma:'B3' },
  },
  ter: {
    '07:30': { subject:'Matemática', teacher:'Renata',   turma:'M3' },
    '08:20': { subject:'Matemática', teacher:'Renata',   turma:'M3' },
    '09:30': { subject:'História',   teacher:'Caetano',  turma:'H2' },
    '10:20': { subject:'História',   teacher:'Caetano',  turma:'H2' },
    '11:30': { subject:'Biologia',   teacher:'Toka',     turma:'B1' },
    '12:15': { subject:'Biologia',   teacher:'Toka',     turma:'B1' },
    '14:20': { subject:'Física',     teacher:'Rodrigo',  turma:'F2' },
    '15:10': { subject:'Física',     teacher:'Rodrigo',  turma:'F2' },
    '16:10': { subject:'Biologia',   teacher:'João',     turma:'B2' },
    '17:00': { subject:'Biologia',   teacher:'João',     turma:'B2' },
  },
  qua: {
    '09:30': { subject:'Matemática', teacher:'Juliana',  turma:'M2' },
    '10:20': { subject:'Matemática', teacher:'Juliana',  turma:'M2' },
    '11:30': { subject:'Física',     teacher:'Maurício', turma:'F1' },
    '12:15': { subject:'Física',     teacher:'Maurício', turma:'F1' },
    '14:20': { subject:'Redação',    teacher:'Roberta',  turma:'R'  },
    '15:10': { subject:'Redação',    teacher:'Roberta',  turma:'R'  },
    '16:10': { subject:'História',   teacher:'J.Carlos', turma:'H1' },
    '17:00': { subject:'História',   teacher:'J.Carlos', turma:'H1' },
  },
  qui: {
    '07:30': { subject:'Matemática', teacher:'Eliene',   turma:'M1' },
    '08:20': { subject:'Matemática', teacher:'Eliene',   turma:'M1' },
    '09:30': { subject:'Literatura', teacher:'Patricia', turma:'Lit'},
    '10:20': { subject:'Literatura', teacher:'Patricia', turma:'Lit'},
    '11:30': { subject:'Química',    teacher:'Duzão',    turma:'Q3' },
    '12:15': { subject:'Química',    teacher:'Duzão',    turma:'Q3' },
    '14:20': { subject:'Sociologia', teacher:'Silvia',   turma:'Gr' },
    '15:10': { subject:'Sociologia', teacher:'Silvia',   turma:'Gr' },
    '16:10': { subject:'Filosofia',  teacher:'Marlon',   turma:'F/S'},
    '17:00': { subject:'Filosofia',  teacher:'Marlon',   turma:'F/S'},
    '18:00': { subject:'Inglês',     teacher:'Gabi',     turma:'I'  },
    '18:45': { subject:'Inglês',     teacher:'Gabi',     turma:'I'  },
  },
  sex: {
    '07:30': { subject:'Física',     teacher:'Mau/Juliana', turma:'F3/HA'},
    '08:20': { subject:'Física',     teacher:'Mau/Juliana', turma:'F3/HA'},
    '09:30': { subject:'Geografia',  teacher:'Álvaro',   turma:'G2' },
    '10:20': { subject:'Geografia',  teacher:'Álvaro',   turma:'G2' },
    '11:30': { subject:'Química',    teacher:'Xiru',     turma:'Q2' },
    '12:15': { subject:'Química',    teacher:'Xiru',     turma:'Q2' },
  },
};

// ── STATE ────────────────────────────────────────────────────────────────
let subjects = JSON.parse(localStorage.getItem('ext_subjects') || 'null') || {...DEFAULT_SUBJECTS};
let schedule = JSON.parse(localStorage.getItem('ext_schedule') || 'null') || deepCopy(RAW);
let hidden   = JSON.parse(localStorage.getItem('ext_hidden')   || '[]');
let editing  = null; // { day, time }

function deepCopy(o){ return JSON.parse(JSON.stringify(o)); }
function save(){
  localStorage.setItem('ext_subjects', JSON.stringify(subjects));
  localStorage.setItem('ext_schedule', JSON.stringify(schedule));
  localStorage.setItem('ext_hidden',   JSON.stringify(hidden));
}

// ── COLOR UTILS ──────────────────────────────────────────────────────────
function hexToRgb(hex){
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}
function subjectColor(name){ return subjects[name] || '#555'; }
function cardStyle(color){
  const {r,g,b} = hexToRgb(color);
  return `background: rgba(${r},${g},${b},.18); border: 1px solid rgba(${r},${g},${b},.4); color: #fff;`;
}

// ── RENDER ───────────────────────────────────────────────────────────────
function render(){
  renderStats();
  renderLegend();
  renderTable();
  renderSubjectsList();
  save();
}

function renderStats(){
  const bar = document.getElementById('statsBar');
  let total = 0, days_with = new Set(), subjects_used = new Set();
  DAY_KEYS.forEach(d => {
    const day = schedule[d] || {};
    Object.keys(day).forEach(t => {
      if(day[t]){
        total++;
        days_with.add(d);
        subjects_used.add(day[t].subject);
      }
    });
  });
  bar.innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Aulas por semana</div></div>
    <div class="stat-card"><div class="stat-num">${days_with.size}</div><div class="stat-label">Dias ativos</div></div>
    <div class="stat-card"><div class="stat-num">${subjects_used.size}</div><div class="stat-label">Matérias ativas</div></div>
    <div class="stat-card"><div class="stat-num">${Object.keys(subjects).length}</div><div class="stat-label">Matérias cadastradas</div></div>
  `;
}

function renderLegend(){
  const lg = document.getElementById('legend');
  lg.innerHTML = '';
  Object.entries(subjects).forEach(([name, color]) => {
    const el = document.createElement('div');
    el.className = 'legend-item' + (hidden.includes(name) ? ' hidden' : '');
    el.innerHTML = `<div class="legend-dot" style="background:${color}"></div>${name}`;
    el.onclick = () => toggleHide(name);
    lg.appendChild(el);
  });
}

function renderTable(){
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  TIME_SLOTS.forEach(slot => {
    const tr = document.createElement('tr');
    if(slot.type === 'break'){
      tr.className = 'break-row';
      tr.innerHTML = `<td>${slot.label}</td><td colspan="5">${slot.label2}</td>`;
    } else {
      tr.innerHTML = `<td class="time-cell">${slot.label}</td>`;
      DAY_KEYS.forEach(day => {
        const td = document.createElement('td');
        td.className = 'slot';
        const entry = (schedule[day] || {})[slot.id];
        if(entry && entry.subject){
          const color = subjectColor(entry.subject);
          const isHidden = hidden.includes(entry.subject);
          td.innerHTML = `
            <div class="aula-card" style="${cardStyle(color)} ${isHidden ? 'opacity:.2;' : ''}"
                 onclick="openEditModal('${day}','${slot.id}')">
              <div class="subject-name">${entry.subject}</div>
              <div class="teacher-name">${entry.teacher || ''}</div>
              ${entry.turma ? `<div class="turma-badge">${entry.turma}</div>` : ''}
            </div>`;
        } else {
          td.innerHTML = `
            <div class="empty-slot" onclick="openAddModal('${day}','${slot.id}')">
              <span>+</span>
            </div>`;
        }
        tr.appendChild(td);
      });
    }
    tbody.appendChild(tr);
  });
}

function renderSubjectsList(){
  const list = document.getElementById('subjectsList');
  list.innerHTML = '';
  Object.entries(subjects).forEach(([name, color]) => {
    const el = document.createElement('div');
    el.className = 'subject-row-item';
    el.innerHTML = `
      <div class="dot" style="background:${color}"></div>
      <div class="sname">${name}</div>
      <div style="display:flex;gap:6px;align-items:center;">
        <input type="color" value="${color}" title="Mudar cor"
          style="width:26px;height:26px;padding:2px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;"
          onchange="changeSubjectColor('${name}', this.value)">
        <button class="del-btn" onclick="removeSubject('${name}')">✕</button>
      </div>`;
    list.appendChild(el);
  });
}

// ── MODAL ────────────────────────────────────────────────────────────────
function populateModalSelects(day, time){
  const daySelect  = document.getElementById('fieldDay');
  const timeSelect = document.getElementById('fieldTime');
  const subSelect  = document.getElementById('fieldSubject');

  daySelect.innerHTML = DAY_KEYS.map((d,i) =>
    `<option value="${d}" ${d===day?'selected':''}>${DAYS[i]}</option>`).join('');

  timeSelect.innerHTML = TIME_SLOTS.filter(s=>s.type==='class').map(s =>
    `<option value="${s.id}" ${s.id===time?'selected':''}>${s.label}</option>`).join('');

  subSelect.innerHTML = Object.keys(subjects).map(n =>
    `<option value="${n}">${n}</option>`).join('');

  updateColorPreview();
}

function openAddModal(day, time){
  editing = null;
  document.getElementById('modalTitle').textContent = '+ Nova Aula';
  document.getElementById('modalSub').textContent   = 'Preencha os dados do compromisso';
  document.getElementById('deleteBtn').style.display = 'none';
  document.getElementById('fieldTeacher').value = '';
  document.getElementById('fieldTurma').value   = '';
  populateModalSelects(day || DAY_KEYS[0], time || TIME_SLOTS[0].id);
  document.getElementById('modalOverlay').classList.add('open');
}

function openEditModal(day, time){
  editing = {day, time};
  const entry = (schedule[day] || {})[time] || {};
  document.getElementById('modalTitle').textContent = 'Editar Aula';
  document.getElementById('modalSub').textContent   = 'Altere os dados do compromisso';
  document.getElementById('deleteBtn').style.display = 'inline-flex';
  document.getElementById('fieldTeacher').value = entry.teacher || '';
  document.getElementById('fieldTurma').value   = entry.turma   || '';
  populateModalSelects(day, time);
  if(entry.subject){
    document.getElementById('fieldSubject').value = entry.subject;
    updateColorPreview();
  }
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }
function handleOverlayClick(e){ if(e.target===e.currentTarget) closeModal(); }

function updateColorPreview(){
  const sub   = document.getElementById('fieldSubject').value;
  const color = subjects[sub] || '#555';
  document.getElementById('colorPreview').style.background = color;
}

function saveSlot(){
  const day     = document.getElementById('fieldDay').value;
  const time    = document.getElementById('fieldTime').value;
  const subject = document.getElementById('fieldSubject').value;
  const teacher = document.getElementById('fieldTeacher').value.trim();
  const turma   = document.getElementById('fieldTurma').value.trim();

  if(!subject){ toast('Selecione uma matéria.', 'error'); return; }
  if(!schedule[day]) schedule[day] = {};
  schedule[day][time] = { subject, teacher, turma };
  closeModal();
  render();
  toast('Aula salva com sucesso!', 'success');
}

function deleteSlot(){
  if(!editing) return;
  const {day, time} = editing;
  if(schedule[day]) delete schedule[day][time];
  closeModal();
  render();
  toast('Aula removida.', 'success');
}

// ── SUBJECTS MGMT ────────────────────────────────────────────────────────
function addSubject(){
  const name  = document.getElementById('newSubjectName').value.trim();
  const color = document.getElementById('newSubjectColor').value;
  if(!name){ toast('Digite o nome da matéria.', 'error'); return; }
  if(subjects[name]){ toast('Matéria já existe.', 'error'); return; }
  subjects[name] = color;
  document.getElementById('newSubjectName').value = '';
  render();
  toast(`"${name}" adicionada!`, 'success');
}

function removeSubject(name){
  if(!confirm(`Remover "${name}"? As aulas desta matéria serão apagadas.`)) return;
  delete subjects[name];
  DAY_KEYS.forEach(d => {
    if(schedule[d]) Object.keys(schedule[d]).forEach(t => {
      if(schedule[d][t] && schedule[d][t].subject === name) delete schedule[d][t];
    });
  });
  render();
  toast(`"${name}" removida.`, 'success');
}

function changeSubjectColor(name, color){
  subjects[name] = color;
  render();
}

function toggleHide(name){
  if(hidden.includes(name)) hidden = hidden.filter(x=>x!==name);
  else hidden.push(name);
  render();
}

// ── IMPORT / EXPORT ──────────────────────────────────────────────────────
function exportJSON(){
  const data = { subjects, schedule };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'horario_extensivo.json';
  a.click();
  toast('Horário exportado!', 'success');
}
function importJSON(){ document.getElementById('importFile').click(); }
function handleImport(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if(data.subjects) subjects = data.subjects;
      if(data.schedule) schedule = data.schedule;
      render();
      toast('Horário importado!', 'success');
    } catch { toast('Erro ao importar arquivo.', 'error'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ── PANEL TOGGLE ─────────────────────────────────────────────────────────
function togglePanel(header){
  header.classList.toggle('collapsed');
  const content = header.nextElementSibling;
  content.style.display = header.classList.contains('collapsed') ? 'none' : '';
}

// ── TOAST ────────────────────────────────────────────────────────────────
let _toastTimer;
function toast(msg, type='success'){
  const el = document.getElementById('toast');
  el.textContent = (type==='success' ? '✓ ' : '✕ ') + msg;
  el.className = 'toast show ' + type;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ── INIT ─────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
